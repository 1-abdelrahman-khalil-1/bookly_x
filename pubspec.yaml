name: bookly_x_client
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.4.0
  internet_connection_checker_plus: ^2.5.0
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  auto_route: ^10.2.0
  pretty_dio_logger: ^1.3.2
  shake_dio_interceptor: ^17.0.2
  sentry_flutter: ^8.0.0
  event_bus: ^2.0.0
  flutter_svg: ^2.0.10
  flutter_typeahead: ^5.2.0
  flutter_searchable_dropdown: ^2.0.0
  intl_phone_field: ^3.2.0
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.4.0
  dotted_border: ^2.1.0
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.2.0
  slang_flutter: ^4.9.0
  flutter_localizations:
    sdk: flutter
  shared_preferences: ^2.3.0
  intl: ^0.20.0
  ua_client_hints: ^1.4.1
  flutter_styled_toast: ^2.2.4
  rxdart: ^0.28.0
  timeago: ^3.7.0
  table_calendar: ^3.2.0
  crypto: ^3.0.3
  sentry: ^8.0.0
  shimmer: ^3.0.0
  flutter_native_splash: ^2.4.7
  email_validator: ^3.0.0
  pinput: ^6.0.2
  pin_code_fields: ^8.0.1
  google_nav_bar: ^5.0.7
  collection: ^1.19.1
  riverpod_infinite_scroll: ^1.0.11
  infinite_scroll_pagination: ^4.1.0
  wheel_picker: ^0.2.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  auto_route_generator: ^10.0.1
  slang_build_runner: ^4.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/png/
    - assets/svg/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: first
      fonts:
        - asset: assets/icons/first.ttf
    - family: second
      fonts:
        - asset: assets/icons/second.ttf
    - family: third
      fonts:
        - asset: assets/icons/third.ttf
    - family: fourth
      fonts:
        - asset: assets/icons/fourth.ttf
    - family: fifth
      fonts:
        - asset: assets/icons/fifth.ttf

flutter_assets:
  assets_path: assets/
  output_path: lib/generated/
  filename: assets.dart
  ignore_comments: true
  field_prefix: null
flutter_native_splash:
  color: "#ffffff"
