openapi: 3.0.3
info:
  title: BooklyX Backend API
  version: 1.0.0
  description: |
    OpenAPI specification for BooklyX backend.

    Notes:
    - Platform-aware endpoints require `platform` header: `APP` or `WEB`.
    - Localized messages use `Accept-Language`: `en` or `ar`.
    - Protected endpoints require `Authorization: Bearer <token>`.
    - Access token format is `<loginSequence>|<jwt>` (example: `15|eyJ...`).
    - In development, OTP is commonly `333333`.
    - Response payload keys are returned in `snake_case`.
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://booklyxbackend-production.up.railway.app
    description: Production server

tags:
  - name: Auth/Verification
  - name: Auth/Session
  - name: Auth/Password Reset
  - name: Branch_admin/Registration
  - name: Branch_admin/Profile
  - name: Branch_admin/Staff
  - name: Branch_admin/Services
  - name: Branch_admin/Subscription
  - name: Branch_admin/Analytics
  - name: Branch_admin/Offers
  - name: Staff/Profile
  - name: Staff/Schedule
  - name: Staff/appointments
  - name: Staff/Income
  - name: Staff/Services
  - name: Staff/Availability
  - name: Client/Profile
  - name: Client/Discovery
  - name: Client/Services
  - name: Client/Offers
  - name: Super_admin/Branches
  - name: Super_admin/Users
  - name: Super_admin/Services
  - name: Super_admin/Analytics
  - name: Super_admin/Payments
  - name: Reviews
  - name: Files

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      required: false
      description: Preferred response language.
      schema:
        type: string
        enum: [en, ar]
        default: en
        example: en
      examples:
        english:
          summary: English language
          value: en
        arabic:
          summary: Arabic language
          value: ar

    PlatformHeader:
      name: platform
      in: header
      required: true
      description: Platform where request is coming from.
      schema:
        type: string
        enum: [APP, WEB]
        default: WEB
        example: WEB
      examples:
        app:
          summary: Mobile app client
          value: APP
        web:
          summary: Web client
          value: WEB

    PlatformHeaderWebOnly:
      name: platform
      in: header
      required: true
      description: Platform where request is coming from.
      schema:
        type: string
        enum: [WEB]
        default: WEB
        example: WEB
      examples:
        web:
          summary: Web client
          value: WEB

    SuperAdminBranchStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [PENDING_APPROVAL, APPROVED, REJECTED]
        default: PENDING_APPROVAL
        example: PENDING_APPROVAL
      examples:
        pendingApproval:
          summary: Pending approval branches
          value: PENDING_APPROVAL
        approved:
          summary: Approved branches
          value: APPROVED
        rejected:
          summary: Rejected branches
          value: REJECTED

    ServiceStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [PENDING_APPROVAL, APPROVED, REJECTED]
        default: PENDING_APPROVAL
        example: PENDING_APPROVAL
      examples:
        pendingApproval:
          summary: Pending approval services
          value: PENDING_APPROVAL
        approved:
          summary: Approved services
          value: APPROVED
        rejected:
          summary: Rejected services
          value: REJECTED

  schemas:
    ApiSuccess:
      type: object
      required: [status, error, message, data]
      properties:
        status:
          type: integer
          example: 200
        error:
          type: boolean
          example: false
        message:
          type: string
          example: Request successful.
        data:
          nullable: true

    ApiError:
      type: object
      required: [status, error, message, data]
      properties:
        status:
          type: integer
          example: 400
        error:
          type: boolean
          example: true
        message:
          type: string
          example: Invalid request.
        data:
          nullable: true
          example: null
        params:
          nullable: true
          example: null

    PlanPreview:
      type: object
      required:
        - id
        - name
        - price
        - max_staff
        - max_services
        - loyalty_enabled
        - offers_enabled
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Starter
        price:
          type: string
          example: "199.00"
        max_staff:
          type: integer
          nullable: true
          example: 3
        max_services:
          type: integer
          nullable: true
          example: 10
        loyalty_enabled:
          type: boolean
          example: false
        offers_enabled:
          type: boolean
          example: false

    VerificationFlags:
      type: object
      required: [email_verified, phone_verified]
      properties:
        email_verified:
          type: boolean
          example: false
        phone_verified:
          type: boolean
          example: true

    LoginForbiddenErrorData:
      type: object
      nullable: true
      required: [email_verified, phone_verified]
      properties:
        email_verified:
          type: boolean
          example: false
        phone_verified:
          type: boolean
          example: true

    LoginForbiddenError:
      allOf:
        - $ref: "#/components/schemas/ApiError"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginForbiddenErrorData"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Abdo Khalil
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        phone:
          type: string
          example: "01000000001"
        role:
          type: string
          enum: [client, staff, branch_admin, super_admin]
          default: client
          example: client
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
          default: ACTIVE
          example: ACTIVE
        email_verified:
          type: boolean
          example: true
        phone_verified:
          type: boolean
          example: true
        staff:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              example: 7
            branch_id:
              type: integer
              example: 1
            profile_image_url:
              type: string
              format: uri
              nullable: true
              example: https://cdn.booklyx.com/staff/mazen-tamer.png
            staff_role:
              type: string
              enum: [DOCTOR, BARBER, SPA_SPECIALIST]
              default: BARBER
              example: BARBER
            commission_percentage:
              type: number
              example: 15
            is_active:
              type: boolean
              example: true
      example:
        id: 2
        name: Abdo Khalil
        email: abdo.khalil@booklyx.com
        phone: "01000000001"
        role: client
        status: ACTIVE
        email_verified: true
        phone_verified: true

    AuthTokens:
      type: object
      properties:
        token:
          type: string
          nullable: false
          description: Access token formatted as `<loginSequence>|<jwt>`.
          example: 15|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access-token
        refresh_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh-token

    LoginResponseData:
      allOf:
        - $ref: "#/components/schemas/AuthTokens"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
      example:
        token: 15|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-access-token
        refresh_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token
        user:
          id: 2
          name: Abdo Khalil
          email: abdo.khalil@booklyx.com
          phone: "01000000001"
          role: client
          status: ACTIVE
          email_verified: true
          phone_verified: true

    RegisterRequest:
      type: object
      required: [name, email, password, phone]
      properties:
        name:
          type: string
          example: Abdo Khalil
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        password:
          type: string
          minLength: 8
          example: "12345678"
        phone:
          type: string
          pattern: '^\\d{11}$'
          example: "01000000001"
      example:
        name: Abdo Khalil
        email: abdo.khalil@booklyx.com
        password: "12345678"
        phone: "01000000001"

    LoginRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        password:
          type: string
          example: "12345678"
        role:
          type: string
          enum: [client, staff, branch_admin, super_admin]
          default: client
          example: client
      example:
        email: abdo.khalil@booklyx.com
        password: "12345678"
        role: client

    VerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        code:
          type: string
          example: "333333"
      example:
        email: abdo.khalil@booklyx.com
        code: "333333"

    ResendCodeRequest:
      type: object
      required: [email, type]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        phone:
          type: string
          pattern: '^\\d{11}$'
          example: "01000000001"
        type:
          type: string
          enum: [EMAIL, PHONE, PASSWORD_RESET]
          default: EMAIL
          example: EMAIL
      example:
        email: abdo.khalil@booklyx.com
        phone: "01000000001"
        type: EMAIL

    RequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
      example:
        email: abdo.khalil@booklyx.com

    VerifyPasswordResetResponseData:
      type: object
      properties:
        reset_token:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
      example:
        reset_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token

    ResetPasswordRequest:
      type: object
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
        newPassword:
          type: string
          minLength: 8
          example: "NewPass123"
      example:
        resetToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
        newPassword: "NewPass123"

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token
      example:
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token

    Pagination:
      type: object
      required: [page, limit, total, total_pages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
        total_pages:
          type: integer
          example: 1

    Review:
      type: object
      required: [id, rating, created_at, reviewer, service, staff]
      properties:
        id:
          type: integer
          minimum: 1
          example: 15
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        comment:
          type: string
          nullable: true
          example: Great experience
        created_at:
          type: string
          format: date-time
          example: 2026-04-21T10:00:00.000Z
        reviewer:
          type: object
          required: [id, name, role]
          properties:
            id:
              type: integer
              example: 3
            name:
              type: string
              example: Abdo Khalil
            role:
              type: string
              enum: [client, staff, branch_admin, super_admin]
              example: client
        service:
          type: object
          required: [id, name]
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Haircut
        staff:
          type: object
          required: [id, user]
          properties:
            id:
              type: integer
              example: 7
            user:
              type: object
              required: [id, name]
              properties:
                id:
                  type: integer
                  example: 6
                name:
                  type: string
                  example: Mazen Tamer

    OfferServiceSummary:
      type: object
      required: [id, name, price, status]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Haircut
        price:
          type: number
          example: 150
        status:
          type: string
          enum: [PENDING_APPROVAL, APPROVED, REJECTED]
          example: APPROVED

    Offer:
      type: object
      required:
        - id
        - title
        - discount_type
        - discount_value
        - start_date
        - end_date
        - is_active
        - used_count
        - branch_id
        - created_at
        - updated_at
        - services
      properties:
        id:
          type: integer
          minimum: 1
          example: 7
        title:
          type: string
          example: Weekend Offer
        description:
          type: string
          nullable: true
          example: 20 percent discount this weekend
        imageUrl:
          type: string
          format: uri
          nullable: true
          example: https://cdn.booklyx.com/offers/weekend-promo.png
        discount_type:
          type: string
          enum: [PERCENTAGE, FIXED]
          example: PERCENTAGE
        discount_value:
          type: number
          example: 20
        start_date:
          type: string
          format: date-time
          example: 2026-04-24T00:00:00.000Z
        end_date:
          type: string
          format: date-time
          example: 2026-04-26T23:59:59.000Z
        is_active:
          type: boolean
          example: true
        usage_limit:
          type: integer
          nullable: true
          example: 100
        used_count:
          type: integer
          example: 0
        branch_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: 2026-04-20T09:00:00.000Z
        updated_at:
          type: string
          format: date-time
          example: 2026-04-20T09:00:00.000Z
        services:
          type: array
          items:
            $ref: "#/components/schemas/OfferServiceSummary"

    StaffIncomeDailyStat:
      type: object
      required: [date, earnings, service_count]
      properties:
        date:
          type: string
          format: date
          description: Local calendar date formatted as YYYY-MM-DD.
          example: 2026-04-15
        earnings:
          type: number
          example: 80
        service_count:
          type: integer
          example: 2

    StaffAppointment:
      type: object
      properties:
        id:
          type: integer
        client:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: integer
                name:
                  type: string
                phone:
                  type: string
                avatar_url:
                  type: string
                  nullable: true
        service:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            description:
              type: string
            price:
              type: number
            duration_minutes:
              type: integer
        scheduled_at:
          type: string
          format: date-time
        notes:
          type: string
          nullable: true
        has_attachments:
          type: boolean
        status:
          type: string
          example: pending

    StaffService:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        price:
          type: number
        durationMinutes:
          type: integer
        imageUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING_APPROVAL, APPROVED, REJECTED]

    StaffSchedule:
      type: object
      properties:
        appointments:
          type: array
          items:
            $ref: "#/components/schemas/StaffAppointment"

    ProfilePlan:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        price:
          type: number
        max_staff:
          type: integer
        max_services:
          type: integer
        loyalty_enabled:
          type: boolean
        offers_enabled:
          type: boolean

    ProfileBranchSettings:
      type: object
      properties:
        allow_cancellation_before_hours:
          type: integer

    ProfileNotificationSettings:
      type: object
      properties:
        booking_notifications_enabled:
          type: boolean
        marketing_notifications_enabled:
          type: boolean

    BranchAvailability:
      type: object
      properties:
        id:
          type: integer
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
        start_time:
          type: string
          example: "09:00"
        end_time:
          type: string
          example: "17:00"
        status:
          type: string
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    StaffProfessionalProfile:
      type: object
      properties:
        id:
          type: integer
        bio:
          type: string
          nullable: true
        experience:
          type: integer
        license_number:
          type: string
          nullable: true
        specialization:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    StaffCertificate:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        issuer:
          type: string
        issue_date:
          type: string
          format: date-time
        expiry_date:
          type: string
          format: date-time
          nullable: true
        file_url:
          type: string
          nullable: true
        verified:
          type: boolean
        created_at:
          type: string
          format: date-time

    StaffAvailability:
      type: object
      properties:
        id:
          type: integer
        day_of_week:
          type: integer
          minimum: 0
          maximum: 6
        start_time:
          type: string
          example: "09:00"
        end_time:
          type: string
          example: "17:00"
        status:
          type: string

    StaffServiceLink:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        price:
          type: number
        duration_minutes:
          type: integer
        imageUrl:
          type: string
          nullable: true
        status:
          type: string

    StaffReview:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: number
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        reviewer:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
            phone:
              type: string
        service:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        appointment_id:
          type: integer
          nullable: true

    BranchReview:
      type: object
      properties:
        id:
          type: integer
        rating:
          type: number
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        reviewer:
          type: object
          properties:
            name:
              type: string
            phone:
              type: string
        service:
          type: object
          properties:
            id:
              type: integer
            name:
              type: string
        staff:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
        appointment_id:
          type: integer
          nullable: true

    BranchAdminProfile:
      type: object
      properties:
        id:
          type: integer
        owner_name:
          type: string
        email:
          type: string
        phone:
          type: string
        business_name:
          type: string
        category:
          type: string
        description:
          type: string
          nullable: true
        logo_url:
          type: string
          nullable: true
        operating_hours:
          type: string
          nullable: true
        address:
          type: string
        city:
          type: string
        district:
          type: string
        status:
          type: string
        is_subscription_active:
          type: boolean
        subscription_started_at:
          type: string
          format: date-time
          nullable: true
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        plan:
          allOf:
            - $ref: "#/components/schemas/ProfilePlan"
          nullable: true
        booking_settings:
          $ref: "#/components/schemas/ProfileBranchSettings"
        notification_settings:
          $ref: "#/components/schemas/ProfileNotificationSettings"
        branch_availability:
          type: array
          items:
            $ref: "#/components/schemas/BranchAvailability"

    BranchAdminProfileResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/BranchAdminProfile"

    BranchAdminProfileUpdate:
      type: object
      properties:
        id:
          type: integer
        owner_name:
          type: string
        email:
          type: string
        phone:
          type: string
        business_name:
          type: string
        category:
          type: string
        logo_url:
          type: string
          nullable: true
        operating_hours:
          type: string
          nullable: true
        address:
          type: string
        city:
          type: string
        district:
          type: string
        status:
          type: string
        updated_at:
          type: string
          format: date-time

    BranchPublicProfile:
      type: object
      properties:
        branch:
          type: object
          properties:
            id:
              type: integer
            business_name:
              type: string
            category:
              type: string
            description:
              type: string
              nullable: true
            logo_url:
              type: string
              nullable: true
            city:
              type: string
            district:
              type: string
            address:
              type: string
            status:
              type: string
            selectedPlan:
              allOf:
                - $ref: "#/components/schemas/ProfilePlan"
              nullable: true
            currentSubscription:
              type: object
              properties:
                plan:
                  allOf:
                    - $ref: "#/components/schemas/ProfilePlan"
                  nullable: true
                is_subscription_active:
                  type: boolean
                subscription_started_at:
                  type: string
                  format: date-time
                  nullable: true
            average_rating:
              type: number
              format: float
            total_reviews:
              type: integer
            booking_settings:
              $ref: "#/components/schemas/ProfileBranchSettings"
            notification_settings:
              $ref: "#/components/schemas/ProfileNotificationSettings"
            branch_availability:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
                  day_of_week:
                    type: integer
                    minimum: 0
                    maximum: 6
                  start_time:
                    type: string
                    example: "09:00"
                  end_time:
                    type: string
                    example: "17:00"
                  status:
                    type: string
        reviews:
          type: array
          items:
            $ref: "#/components/schemas/BranchReview"

    StaffProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
