openapi: 3.0.3
info:
  title: BooklyX Backend API
  version: 1.0.0
  description: |
    OpenAPI specification for BooklyX backend.

    Notes:
    - Platform-aware endpoints require `platform` header: `APP` or `WEB`.
    - Localized messages use `Accept-Language`: `en` or `ar`.
    - Protected endpoints require `Authorization: Bearer <token>`.
    - Access token format is `<loginSequence>|<jwt>` (example: `15|eyJ...`).
    - In development, OTP is commonly `333333`.
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://booklyxbackend-production.up.railway.app
    description: Production server

tags:
  - name: Auth/Verification
  - name: Auth/Session
  - name: Auth/Password Reset
  - name: branch_admin/Application
  - name: branch_admin/Profile
  - name: branch_admin/Staff
  - name: branch_admin/Services
  - name: branch_admin/Offers
  - name: staff/Profile
  - name: staff/Schedule
  - name: staff/Requests
  - name: staff/Appointments
  - name: staff/Income
  - name: staff/Services
  - name: staff/Availability
  - name: super_admin/Applications
  - name: super_admin/Services
  - name: Reviews
  - name: Files

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    AcceptLanguageHeader:
      name: Accept-Language
      in: header
      required: false
      description: Preferred response language.
      schema:
        type: string
        enum: [en, ar]
        default: en
        example: en
      examples:
        english:
          summary: English language
          value: en
        arabic:
          summary: Arabic language
          value: ar

    PlatformHeader:
      name: platform
      in: header
      required: true
      description: Platform where request is coming from.
      schema:
        type: string
        enum: [APP, WEB]
        default: APP
        example: APP
      examples:
        app:
          summary: Mobile app client
          value: APP
        web:
          summary: Web client
          value: WEB

    ApplicationStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [PENDING_VERIFICATION, PENDING_APPROVAL, APPROVED, REJECTED]
        default: PENDING_APPROVAL
        example: PENDING_APPROVAL
      examples:
        pendingVerification:
          summary: Pending verification applications
          value: PENDING_VERIFICATION
        pendingApproval:
          summary: Pending approval applications
          value: PENDING_APPROVAL
        approved:
          summary: Approved applications
          value: APPROVED
        rejected:
          summary: Rejected applications
          value: REJECTED

    ServiceStatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
        enum: [PENDING_APPROVAL, APPROVED, REJECTED]
        default: PENDING_APPROVAL
        example: PENDING_APPROVAL
      examples:
        pendingApproval:
          summary: Pending approval services
          value: PENDING_APPROVAL
        approved:
          summary: Approved services
          value: APPROVED
        rejected:
          summary: Rejected services
          value: REJECTED

  schemas:
    ApiSuccess:
      type: object
      required: [status, error, message, data]
      properties:
        status:
          type: integer
          example: 200
        error:
          type: boolean
          example: false
        message:
          type: string
          example: Request successful.
        data:
          nullable: true

    ApiError:
      type: object
      required: [status, error, message, data]
      properties:
        status:
          type: integer
          example: 400
        error:
          type: boolean
          example: true
        message:
          type: string
          example: Invalid request.
        data:
          nullable: true
          example: null
        params:
          nullable: true
          example: null

    VerificationFlags:
      type: object
      required: [emailVerified, phoneVerified]
      properties:
        emailVerified:
          type: boolean
          example: false
        phoneVerified:
          type: boolean
          example: true

    LoginForbiddenErrorData:
      type: object
      nullable: true
      required: [emailVerified, phoneVerified]
      properties:
        emailVerified:
          type: boolean
          example: false
        phoneVerified:
          type: boolean
          example: true

    LoginForbiddenError:
      allOf:
        - $ref: "#/components/schemas/ApiError"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/LoginForbiddenErrorData"

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Abdo Khalil
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        phone:
          type: string
          example: "01000000001"
        role:
          type: string
          enum: [client, staff, branch_admin, super_admin]
          default: client
          example: client
        status:
          type: string
          enum: [ACTIVE, INACTIVE, SUSPENDED]
          default: ACTIVE
          example: ACTIVE
        emailVerified:
          type: boolean
          example: true
        phoneVerified:
          type: boolean
          example: true
        staff:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              example: 7
            branchId:
              type: integer
              example: 1
            profileImageUrl:
              type: string
              format: uri
              nullable: true
              example: https://cdn.booklyx.com/staff/mazen-tamer.png
            staffRole:
              type: string
              enum: [DOCTOR, BARBER, SPA_SPECIALIST]
              default: BARBER
              example: BARBER
            commissionPercentage:
              type: number
              example: 15
            isActive:
              type: boolean
              example: true
      example:
        id: 2
        name: Abdo Khalil
        email: abdo.khalil@booklyx.com
        phone: "01000000001"
        role: client
        status: ACTIVE
        emailVerified: true
        phoneVerified: true

    AuthTokens:
      type: object
      properties:
        token:
          type: string
          nullable: false
          description: Access token formatted as `<loginSequence>|<jwt>`.
          example: 15|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.access-token
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh-token

    LoginResponseData:
      allOf:
        - $ref: "#/components/schemas/AuthTokens"
        - type: object
          properties:
            user:
              $ref: "#/components/schemas/User"
      example:
        token: 15|eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-access-token
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token
        user:
          id: 2
          name: Abdo Khalil
          email: abdo.khalil@booklyx.com
          phone: "01000000001"
          role: client
          status: ACTIVE
          emailVerified: true
          phoneVerified: true

    RegisterRequest:
      type: object
      required: [name, email, password, phone]
      properties:
        name:
          type: string
          example: Abdo Khalil
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        password:
          type: string
          minLength: 8
          example: "12345678"
        phone:
          type: string
          pattern: '^\\d{11}$'
          example: "01000000001"
      example:
        name: Abdo Khalil
        email: abdo.khalil@booklyx.com
        password: "12345678"
        phone: "01000000001"

    LoginRequest:
      type: object
      required: [email, password, role]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        password:
          type: string
          example: "12345678"
        role:
          type: string
          enum: [client, staff, branch_admin, super_admin]
          default: client
          example: client
      example:
        email: abdo.khalil@booklyx.com
        password: "12345678"
        role: client

    VerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        code:
          type: string
          example: "333333"
      example:
        email: abdo.khalil@booklyx.com
        code: "333333"

    ResendCodeRequest:
      type: object
      required: [email, type]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
        phone:
          type: string
          pattern: '^\\d{11}$'
          example: "01000000001"
        type:
          type: string
          enum: [EMAIL, PHONE, PASSWORD_RESET]
          default: EMAIL
          example: EMAIL
      example:
        email: abdo.khalil@booklyx.com
        phone: "01000000001"
        type: EMAIL

    RequestPasswordResetRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
          example: abdo.khalil@booklyx.com
      example:
        email: abdo.khalil@booklyx.com

    VerifyPasswordResetResponseData:
      type: object
      properties:
        resetToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
      example:
        resetToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token

    ResetPasswordRequest:
      type: object
      required: [resetToken, newPassword]
      properties:
        resetToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
        newPassword:
          type: string
          minLength: 8
          example: "NewPass123"
      example:
        resetToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.password-reset-token
        newPassword: "NewPass123"

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token
      example:
        refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.client-refresh-token

    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
        totalPages:
          type: integer
          example: 1

    Review:
      type: object
      required: [id, rating, createdAt, reviewer, service, staff]
      properties:
        id:
          type: string
          format: uuid
          example: 2f5100e4-6400-4db4-9172-7abdc18b0f88
        rating:
          type: integer
          minimum: 1
          maximum: 5
          example: 5
        comment:
          type: string
          nullable: true
          example: Great experience
        createdAt:
          type: string
          format: date-time
          example: 2026-04-21T10:00:00.000Z
        reviewer:
          type: object
          required: [id, name, role]
          properties:
            id:
              type: integer
              example: 3
            name:
              type: string
              example: Abdo Khalil
            role:
              type: string
              enum: [client, staff, branch_admin, super_admin]
              example: client
        service:
          type: object
          required: [id, name]
          properties:
            id:
              type: integer
              example: 1
            name:
              type: string
              example: Haircut
        staff:
          type: object
          required: [id, user]
          properties:
            id:
              type: integer
              example: 7
            user:
              type: object
              required: [id, name]
              properties:
                id:
                  type: integer
                  example: 6
                name:
                  type: string
                  example: Mazen Tamer

    OfferServiceSummary:
      type: object
      required: [id, name, price, status]
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Haircut
        price:
          type: number
          example: 150
        status:
          type: string
          enum: [PENDING_APPROVAL, APPROVED, REJECTED]
          example: APPROVED

    Offer:
      type: object
      required:
        - id
        - title
        - discountType
        - discountValue
        - startDate
        - endDate
        - isActive
        - usedCount
        - branchId
        - createdAt
        - updatedAt
        - services
      properties:
        id:
          type: string
          format: uuid
          example: 7f6d2f79-34f7-4f01-b9fb-6f8d71f618f9
        title:
          type: string
          example: Weekend Offer
        description:
          type: string
          nullable: true
          example: 20 percent discount this weekend
        discountType:
          type: string
          enum: [PERCENTAGE, FIXED]
          example: PERCENTAGE
        discountValue:
          type: number
          example: 20
        startDate:
          type: string
          format: date-time
          example: 2026-04-24T00:00:00.000Z
        endDate:
          type: string
          format: date-time
          example: 2026-04-26T23:59:59.000Z
        isActive:
          type: boolean
          example: true
        usageLimit:
          type: integer
          nullable: true
          example: 100
        usedCount:
          type: integer
          example: 0
        branchId:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: 2026-04-20T09:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-20T09:00:00.000Z
        services:
          type: array
          items:
            $ref: "#/components/schemas/OfferServiceSummary"

    StaffIncomeDailyStat:
      type: object
      required: [date, earnings, serviceCount]
      properties:
        date:
          type: string
          format: date
          description: Local calendar date formatted as YYYY-MM-DD.
          example: 2026-04-15
        earnings:
          type: number
          example: 80
        serviceCount:
          type: integer
          example: 2

    BranchAdminApplyRequestJson:
      type: object
      required:
        - ownerName
        - email
        - phone
        - password
        - businessName
        - category
        - description
        - city
        - district
        - address
        - taxId
        - commercialRegisterNumber
        - latitude
        - longitude
      properties:
        ownerName:
          type: string
          example: Mahmoud Ibrahim
        email:
          type: string
          format: email
          example: mahmoud.ibrahim@booklyx.com
        phone:
          type: string
          pattern: '^\\d{11}$'
          example: "01000000011"
        password:
          type: string
          minLength: 8
          example: "12345678"
        businessName:
          type: string
          example: Hassan Beauty Salon
        category:
          type: string
          enum: [SPA, CLINIC, BARBER]
          default: SPA
          example: SPA
        description:
          type: string
          example: Premium beauty and skincare services for women.
        city:
          type: string
          example: Cairo
        district:
          type: string
          example: Nasr City
        address:
          type: string
          example: 12 Makram Ebeid Street
        taxId:
          type: string
          example: TAX-2026-010
        commercialRegisterNumber:
          type: string
          example: CR-2026-010
        latitude:
          type: number
          format: double
          example: 30.0626
        longitude:
          type: number
          format: double
          example: 31.3368
      example:
        ownerName: Mahmoud Ibrahim
        email: mahmoud.ibrahim@booklyx.com
        phone: "01000000011"
        password: "12345678"
        businessName: Hassan Beauty Salon
        category: SPA
        description: Premium beauty and skincare services.
        commercialRegisterNumber: CR-2026-001
        taxId: TAX-2026-001
        city: Cairo
        district: Nasr City
        address: 12 Makram Ebeid Street
        latitude: 30.0626
        longitude: 31.3368
        logoUrl: https://cdn.booklyx.com/branches/hassan-beauty-salon-logo.png

    BranchAdminApplyRequestMultipart:
      allOf:
        - $ref: "#/components/schemas/BranchAdminApplyRequestJson"
        - type: object
          properties:
            logo:
              type: string
              format: binary
            taxCertificate:
              type: string
              format: binary
            commercialRegister:
              type: string
              format: binary
            nationalId:
              type: string
              format: binary
            facilityLicense:
              type: string
              format: binary

    BranchResendCodeRequest:
      type: object
      required: [email, type]
      properties:
        email:
          type: string
          format: email
          example: mona.adel@booklyx.com
        type:
          type: string
          enum: [EMAIL, PHONE]
          default: EMAIL
          example: PHONE
      example:
        email: mona.adel@booklyx.com
        type: PHONE

    CreateStaffRequest:
      type: object
      required:
        [
          name,
          email,
          phone,
          password,
          age,
          startDate,
          staffRole,
          commissionPercentage,
          serviceIds,
        ]
      properties:
        name:
          type: string
          example: Mazen Tamer
        email:
          type: string
          format: email
          example: mazen.tamer@booklyx.com
        phone:
          type: string
          pattern: '^\\d{11}$'
          example: "01000000021"
        password:
          type: string
          minLength: 8
          example: "12345678"
        age:
          type: integer
          minimum: 18
          example: 28
        startDate:
          type: string
          format: date-time
          example: 2026-03-01T00:00:00.000Z
        staffRole:
          type: string
          enum: [DOCTOR, BARBER, SPA_SPECIALIST]
          default: BARBER
          example: BARBER
        profileImageUrl:
          type: string
          format: uri
          example: https://cdn.booklyx.com/staff/mazen-tamer.png
        commissionPercentage:
          type: number
          minimum: 0
          maximum: 100
          example: 15
        serviceIds:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
          example: [1, 2]
      example:
        name: Mazen Tamer
        email: mazen.tamer@booklyx.com
        phone: "01000000021"
        password: "12345678"
        age: 28
        startDate: 2026-03-01T00:00:00.000Z
        staffRole: BARBER
        profileImageUrl: https://cdn.booklyx.com/staff/mazen-tamer.png
        commissionPercentage: 15
        serviceIds: [1, 2]

    UpdateStaffRequest:
      type: object
      properties:
        name:
          type: string
          example: Mazen Tamer Updated
        email:
          type: string
          format: email
          example: mazen.updated@booklyx.com
        phone:
          type: string
          pattern: '^\\d{11}$'
          example: "01000000031"
        age:
          type: integer
          minimum: 18
          example: 29
        startDate:
          type: string
          format: date-time
          example: 2026-04-01T00:00:00.000Z
        staffRole:
          type: string
          enum: [DOCTOR, BARBER, SPA_SPECIALIST]
          example: BARBER
        profileImageUrl:
          type: string
          format: uri
          nullable: true
          example: https://cdn.booklyx.com/staff/mazen-tamer-v2.png
        commissionPercentage:
          type: number
          minimum: 0
          maximum: 100
          example: 20
        serviceIds:
          type: array
          minItems: 1
          items:
            type: integer
            minimum: 1
          example: [2, 3]

    AddServiceCategoryRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Hair Care
      example:
        name: Hair Care

    ServiceCategory:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Hair Care
        branchId:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T10:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-09T10:00:00.000Z
      example:
        id: 1
        name: Hair Care
        branchId: 1
        createdAt: 2026-04-09T10:00:00.000Z
        updatedAt: 2026-04-09T10:00:00.000Z

    CreateServiceRequestJson:
      type: object
      required: [name, description, price, durationMinutes]
      properties:
        name:
          type: string
          example: Haircut
        description:
          type: string
          example: Professional haircut with styling
        price:
          type: number
          minimum: 0.01
          example: 150
        durationMinutes:
          type: integer
          minimum: 1
          example: 30
        categoryId:
          type: integer
          minimum: 1
          example: 1
        categoryName:
          type: string
          example: Hair Care
        imageUrl:
          type: string
          format: uri
          example: https://cdn.booklyx.com/services/haircut.png
      example:
        name: Haircut
        description: Professional haircut with styling
        price: 150
        durationMinutes: 30
        categoryName: Hair Care
        imageUrl: https://cdn.booklyx.com/services/haircut.png

    CreateServiceRequestMultipart:
      allOf:
        - $ref: "#/components/schemas/CreateServiceRequestJson"
        - type: object
          properties:
            image:
              type: string
              format: binary

    UpdateServiceRequestJson:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
          example: 1
        name:
          type: string
          example: Premium Haircut
        description:
          type: string
          example: Professional haircut with wash and styling
        price:
          type: number
          minimum: 0.01
          example: 180
        durationMinutes:
          type: integer
          minimum: 1
          example: 40
        categoryId:
          type: integer
          minimum: 1
          example: 1
        categoryName:
          type: string
          example: Hair Care
        imageUrl:
          type: string
          format: uri
          example: https://cdn.booklyx.com/services/premium-haircut.png
      example:
        id: 1
        name: Premium Haircut
        description: Professional haircut with wash and styling
        price: 180
        durationMinutes: 40
        categoryId: 1
        imageUrl: https://cdn.booklyx.com/services/premium-haircut.png

    UpdateServiceRequestMultipart:
      allOf:
        - $ref: "#/components/schemas/UpdateServiceRequestJson"
        - type: object
          properties:
            image:
              type: string
              format: binary

    Service:
      type: object
      properties:
        id:
          type: integer
          example: 1
        branchId:
          type: integer
          example: 1
        serviceCategoryId:
          type: integer
          nullable: true
          example: 1
        name:
          type: string
          example: Haircut
        description:
          type: string
          example: Professional haircut with styling
        price:
          type: number
          example: 150
        durationMinutes:
          type: integer
          example: 30
        imageUrl:
          type: string
          nullable: true
          example: https://cdn.booklyx.com/services/haircut.png
        status:
          type: string
          enum: [PENDING_APPROVAL, APPROVED, REJECTED]
          default: PENDING_APPROVAL
          example: APPROVED
        rejectionReason:
          type: string
          nullable: true
          example: null
        createdAt:
          type: string
          format: date-time
          example: 2026-04-09T10:15:00.000Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-04-09T10:15:00.000Z
        category:
          allOf:
            - $ref: "#/components/schemas/ServiceCategory"
          nullable: true
        branch:
          type: object
          nullable: true
          properties:
            id:
              type: integer
              example: 1
            businessName:
              type: string
              example: Hassan Beauty Salon
            ownerName:
              type: string
              example: Mahmoud Ibrahim
            userId:
              type: integer
              example: 5
            status:
              type: string
              enum: [PENDING_VERIFICATION, PENDING_APPROVAL, APPROVED, REJECTED]
              default: PENDING_VERIFICATION
              example: APPROVED
      example:
        id: 1
        branchId: 1
        serviceCategoryId: 1
        name: Haircut
        description: Professional haircut with styling
        price: 150
        durationMinutes: 30
